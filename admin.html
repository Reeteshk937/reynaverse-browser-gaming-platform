<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REYNAVERSE | System Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    
    <div id="sidebar-container"></div>
    
    <div class="admin-main-wrapper">
        <div id="navbar-container"></div>
        
        <main class="admin-content">
            <section id="view-dashboard" class="admin-view active">
                <header class="view-header">
                    <h1>TELEMETRY OVERVIEW</h1>
                    <p>Enter the Future of Gaming - Platform Statistics</p>
                </header>
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-gamepad stat-icon text-neon-blue"></i>
                        <div class="stat-info"><h3>Total Games</h3><span class="stat-value">142</span></div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-heart stat-icon text-neon-red"></i>
                        <div class="stat-info"><h3>Global Favorites</h3><span class="stat-value">12.4K</span></div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-eye stat-icon text-neon-cyan"></i>
                        <div class="stat-info"><h3>Total Views</h3><span class="stat-value">845.2K</span></div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-fire stat-icon text-neon-yellow"></i>
                        <div class="stat-info"><h3>Most Played</h3><span class="stat-value">Cyber Runner v2</span></div>
                    </div>
                </div>
            </section>

            <section id="view-add-game" class="admin-view">
                <header class="view-header">
                    <h1>DEPLOY NEW NODE</h1>
                    <p>Inject new gaming logic into the mainframe.</p>
                </header>
                <form class="admin-form" id="add-game-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Game Title</label>
                            <input type="text" required placeholder="e.g. Neon Drift">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select required>
                                <option value="action">Action</option>
                                <option value="racing">Racing</option>
                                <option value="horror">Horror</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Thumbnail URL</label>
                            <input type="url" placeholder="https://...">
                        </div>
                        <div class="form-group full-width">
                            <label>Game Source URL (iFrame/HTML5)</label>
                            <input type="url" placeholder="https://...">
                        </div>
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea rows="4" placeholder="Enter cyber-parameters..."></textarea>
                        </div>
                        <div class="form-toggle">
                            <label class="switch">
                                <input type="checkbox" id="toggle-featured">
                                <span class="slider"></span>
                            </label>
                            <span>Mark as Featured</span>
                        </div>
                        <div class="form-actions full-width">
                            <button type="submit" class="btn btn-primary cyber-glitch-btn">UPLOAD TO MATRIX</button>
                        </div>
                    </div>
                </form>
            </section>

            <section id="view-settings" class="admin-view">
                <header class="view-header">
                    <h1>SYSTEM SETTINGS</h1>
                </header>
                <div class="settings-panel">
                    <h3>UI THEME OVERRIDE</h3>
                    <div class="theme-options">
                        <button class="theme-btn" data-theme="cyberpunk-neon">Cyberpunk Neon</button>
                        <button class="theme-btn" data-theme="neon-purple">Neon Purple</button>
                        <button class="theme-btn" data-theme="dark-gaming">Dark Gaming</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
