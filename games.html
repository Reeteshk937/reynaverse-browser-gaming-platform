<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Games | REYNAVERSE</title>
    
    <meta name="description" content="Explore the complete matrix of high-octane cyberpunk browser games on REYNAVERSE.">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game-page.css">
</head>
<body class="catalog-body">

    <div class="scroll-progress-container"><div class="scroll-progress-bar" id="scroll-bar"></div></div>
    <button id="back-to-top" class="back-to-top-btn" aria-label="Return to top"><i class="fas fa-chevron-up"></i></button>

    <div class="search-overlay" id="search-overlay">
        <button class="close-search" id="close-search" aria-label="Close Search"><i class="fas fa-times"></i></button>
        <div class="search-matrix">
            <h2 class="search-title">SEARCH THE <span class="neon-text-magenta">MAINFRAME</span></h2>
            <div class="search-input-wrapper">
                <input type="text" placeholder="Locate game, category, or module..." class="massive-search-input" id="search-input">
                <div class="search-line-glow"></div>
            </div>
        </div>
    </div>

    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">REYNA<span class="neon-text-cyan">VERSE</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">Home</a></li>
                <li><a href="games.html" class="nav-item active">Games</a></li>
                <li><a href="trending.html" class="nav-item">Trending</a></li>
                <li><a href="categories.html" class="nav-item">Categories</a></li>
            </ul>
            <div class="nav-actions">
                <button class="search-trigger" id="search-trigger" aria-label="Open Search"><i class="fas fa-search search-icon"></i></button>
                <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Navigation">
                    <span class="bar top-bar"></span><span class="bar mid-bar"></span><span class="bar bot-bar"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="catalog-main">
        <section class="page-header bg-alt-2" style="padding-top: 120px;">
            <div class="container text-center">
                <h1 class="page-title">THE <span class="neon-text-cyan">MATRIX</span> ARCHIVE</h1>
                <p class="page-desc">Access all deployed sectors and subsystems.</p>
                
                <div class="catalog-filters">
                    <div class="search-box massive" style="margin-bottom: 20px;">
                        <input type="text" id="live-search-input" placeholder="Initialize live filtering..." class="search-input" style="width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--color-cyan); color: #fff;">
                    </div>
                    <div class="filter-pills" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
                        <button class="filter-pill active" data-filter="all">ALL</button>
                        <button class="filter-pill" data-filter="action">ACTION</button>
                        <button class="filter-pill" data-filter="racing">RACING</button>
                        <button class="filter-pill" data-filter="horror">HORROR</button>
                        <button class="filter-pill" data-filter="cricket">CRICKET</button>
                        <button class="filter-pill" data-filter="multiplayer">MULTIPLAYER</button>
                        <button class="filter-pill" data-filter="puzzle">PUZZLE</button>
                        <button class="filter-pill" data-filter="meme">MEME</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="ad-placeholder banner-ad" style="margin-bottom: 40px;"><span>[ADSENSE LEADERBOARD]</span></div>

                <div class="games-grid" id="dynamic-games-grid">
                    <div class="loader-spinner" style="grid-column: 1/-1; margin: 50px auto;"></div>
                </div>
                
                <div class="ad-placeholder banner-ad" style="margin-top: 40px;"><span>[ADSENSE BOTTOM BANNER]</span></div>
            </div>
        </section>
    </main>

    <footer class="footer reveal-up">
        <div class="footer-top container">
            <div class="footer-brand">
                <a href="index.html" class="footer-logo">REYNA<span class="neon-text-cyan">VERSE</span></a>
                <p class="footer-desc">Enter the Future of Gaming.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="container footer-bottom-flex">
                <p class="copyright">&copy; 2026 REYNAVERSE. ALL COGNITIVE RIGHTS RESERVED.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/games.js"></script>
</body>
</html>
